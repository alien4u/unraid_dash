<header class="ut-toolbar">
    <div class="ut-toolbar-left">
        <img src="img/icon32.png" alt="" class="ut-toolbar-logo">
        <span class="ut-toolbar-title">Unraid Dash</span>
    </div>
    <div class="ut-toolbar-actions">
        <button id="themeToggle" class="ut-icon-btn" title="Toggle theme">
            <svg class="ut-icon ut-icon-sun"><use href="#ico-sun"/></svg>
            <svg class="ut-icon ut-icon-moon"><use href="#ico-moon"/></svg>
        </button>
        <button id="compactToggle" class="ut-icon-btn" title="Toggle compact mode">
            <svg class="ut-icon"><use href="#ico-compact"/></svg>
        </button>
        <button id="refreshBtn" class="ut-icon-btn" title="Refresh data">
            <svg class="ut-icon"><use href="#ico-refresh"/></svg>
        </button>
        <button id="settingsBtn" class="ut-icon-btn" title="Settings">
            <svg class="ut-icon"><use href="#ico-settings"/></svg>
        </button>
    </div>
</header>

<nav id="serverTabs" class="ut-server-tabs" style="display:none;"></nav>

<div id="spinner" class="ut-spinner">
    <span class="ut-dot"></span>
    <span class="ut-dot"></span>
    <span class="ut-dot"></span>
</div>

<div id="message" class="ut-message" style="display:none;"></div>

<main id="dashboard" class="ut-dashboard" style="display:none;">
    <div id="cardSystem" class="ut-card" data-card="system"></div>
    <div id="cardArray" class="ut-card" data-card="array"></div>
    <div id="cardDocker" class="ut-card" data-card="docker"></div>
    <div id="cardVMs" class="ut-card" data-card="vms"></div>
    <div id="cardNotifications" class="ut-card" data-card="notifications"></div>
</main>

<div id="urlOverrideBackdrop" class="ut-modal-backdrop" style="display:none;">
    <div id="urlOverrideModal" class="ut-modal">
        <div class="ut-modal-header">
            <span id="urlModalName" class="ut-modal-header-title"></span>
            <button id="urlModalClose" class="ut-icon-btn" title="Close">
                <svg class="ut-icon"><use href="#ico-close"/></svg>
            </button>
        </div>
        <div class="ut-modal-body">
            <div>
                <label>Display Name</label>
                <input type="text" id="itemNameInput" class="ut-input" placeholder="Leave blank for original name" autocomplete="off">
            </div>
            <div id="urlSection" class="ut-modal-url-section">
                <div>
                    <label>Auto-Detected URL</label>
                    <div id="urlModalDetected" class="ut-url-detected">—</div>
                </div>
                <label class="ut-override-toggle">
                    <input type="checkbox" id="urlOverrideCheckbox">
                    Override with custom URL
                </label>
                <div>
                    <label>Custom URL</label>
                    <input type="text" id="urlOverrideInput" class="ut-input" placeholder="https://example.local:9443" autocomplete="off" disabled>
                </div>
            </div>
        </div>
        <div class="ut-modal-footer">
            <button id="urlModalCancel" class="ut-btn ut-btn-ghost">Cancel</button>
            <button id="urlModalSave" class="ut-btn ut-btn-primary">Save</button>
        </div>
    </div>
</div>

<div id="listSettingsBackdrop" class="ut-modal-backdrop" style="display:none;">
    <div id="listSettingsModal" class="ut-modal">
        <div class="ut-modal-header">
            <span id="listSettingsTitle" class="ut-modal-header-title"></span>
            <button id="listSettingsClose" class="ut-icon-btn" title="Close">
                <svg class="ut-icon"><use href="#ico-close"/></svg>
            </button>
        </div>
        <div class="ut-modal-body">
            <div>
                <label>Sort Order</label>
                <select id="listSettingsSort" class="ut-select">
                    <option value="running-az">Running first, A-Z</option>
                    <option value="az">A-Z</option>
                    <option value="za">Z-A</option>
                    <option value="custom">Custom order</option>
                </select>
            </div>
            <div>
                <label>Visible Items</label>
                <select id="listSettingsCount" class="ut-select">
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="0">All</option>
                </select>
            </div>
            <div id="listSettingsCustomSection" style="display:none;">
                <div class="ut-custom-order-header">Drag to reorder</div>
                <div id="listSettingsCustomList" class="ut-custom-order-list"></div>
            </div>
        </div>
        <div class="ut-modal-footer">
            <button id="listSettingsCancel" class="ut-btn ut-btn-ghost">Cancel</button>
            <button id="listSettingsSave" class="ut-btn ut-btn-primary">Save</button>
        </div>
    </div>
</div>

<div id="settingsPanel" class="ut-settings" style="display:none;">

    <div class="ut-settings-header">
        <button id="settingsBack" class="ut-icon-btn" title="Back to dashboard">
            <svg class="ut-icon"><use href="#ico-back"/></svg>
        </button>
        <span class="ut-settings-title">Settings</span>
    </div>

    <div class="ut-settings-section">
        <div class="ut-settings-section-header">
            <span>Servers</span>
            <button id="addServerBtn" class="ut-btn-sm" title="Add server">
                <svg class="ut-icon"><use href="#ico-plus"/></svg>
                <span>Add</span>
            </button>
        </div>
        <div id="serverList" class="ut-server-list"></div>
    </div>

    <div id="serverForm" class="ut-server-form" style="display:none;">
        <div class="ut-form-title" id="serverFormTitle">Add Server</div>
        <input type="hidden" id="serverFormId">
        <label class="ut-form-label">
            Display Name
            <input type="text" id="serverFormName" class="ut-input" placeholder="e.g. Tower" autocomplete="off">
        </label>
        <label class="ut-form-label">
            Server URL
            <input type="text" id="serverFormUrl" class="ut-input" placeholder="http://192.168.1.100" autocomplete="off">
        </label>
        <label class="ut-form-label">
            API Key
            <input type="password" id="serverFormKey" class="ut-input" placeholder="Your Unraid API key" autocomplete="off">
        </label>
        <div class="ut-form-actions">
            <button id="testConnectionBtn" class="ut-btn ut-btn-outline">Test Connection</button>
            <div class="ut-form-actions-right">
                <button id="cancelServerBtn" class="ut-btn ut-btn-ghost">Cancel</button>
                <button id="saveServerBtn" class="ut-btn ut-btn-primary">Save</button>
            </div>
        </div>
        <div id="testResult" class="ut-test-result" style="display:none;"></div>
    </div>

    <div class="ut-settings-section">
        <div class="ut-settings-section-header">
            <span>Preferences</span>
        </div>
        <label class="ut-form-label">
            Auto-Refresh Interval
            <select id="refreshInterval" class="ut-select">
                <option value="0">Off</option>
                <option value="30000">30 seconds</option>
                <option value="60000" selected>60 seconds</option>
                <option value="300000">5 minutes</option>
            </select>
        </label>
    </div>

    <div class="ut-settings-section">
        <div class="ut-settings-section-header">
            <span>Card Order</span>
        </div>
        <div class="ut-card-order-hint">Drag to reorder, uncheck to hide</div>
        <div id="cardOrderList" class="ut-custom-order-list"></div>
    </div>

</div>

<div id="resizeHandle" class="ut-resize-handle"></div>

<footer class="ut-footer">
    <span id="footerVersion" class="ut-footer-text">Unraid Dash</span>
    <span class="ut-footer-sep"></span>
    <a href="https://alientechnologyllc.com" target="_blank" rel="noopener" class="ut-footer-link">
        <img src="img/alien-tech.svg" alt="" class="ut-footer-logo">
        <span>by Alien Technology LLC</span>
    </a>
</footer>

</body>
</html>
